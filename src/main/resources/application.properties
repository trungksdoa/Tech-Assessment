spring.application.name=Convert_Tickets_Booking

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# SpringDoc / Swagger
springdoc.packages-to-scan=technical.assessment.convert_tickets_booking
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true

springdoc.show-data-rest=false


springdoc.show-actuator=false
